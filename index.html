            </div>

            <button class="neo-box btn-style" onclick="downloadFile()">download</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    
    <script>
        const inputEditor = CodeMirror.fromTextArea(document.getElementById("input_editor"), {
            mode: "lua",
            theme: "material-palenight",
            lineNumbers: true,
            indentWithTabs: true,
            smartIndent: true,
            lineWrapping: true,
            autofocus: true
        });
        
        const outputEditor = CodeMirror.fromTextArea(document.getElementById("output_editor"), {
            mode: "lua",
            theme: "material-palenight",
            lineNumbers: true,
            readOnly: true,
            lineWrapping: true
        });

        let lastOutput = "";
        const API = "/api/obfuscate";

        async function run() {
            const btn = document.getElementById("btn-obfuscate");
            const btnText = btn.querySelector('span');
            const code = inputEditor.getValue();
            
            if(!code.trim()) {
                alert("masukin kode lua lu duluh tot");
                return;
            }

            btnText.innerText = "proses...";
            btn.style.opacity = "0.8";

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ code })
                });

                const data = await res.json();
                lastOutput = data.obfuscated || "ERROR";
                outputEditor.setValue(lastOutput);

            } catch (err) {
                outputEditor.setValue("API ERROR");
            } finally {
                btnText.innerText = "obfuscate";
                btn.style.opacity = "1";
            }
        }

        function copyText() {
            if(!lastOutput) return alert("kosong kontol");
            navigator.clipboard.writeText(lastOutput)
                .then(() => alert("code disalin"))
                .catch(err => {
                    alert("gagal menyalin");
                });
        }

        function downloadFile() {
            if(!lastOutput) return alert("kosong kontol");
            const blob = new Blob([lastOutput], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "obfuscate.lua";
            a.click();
            URL.revokeObjectURL(a.href);
        }
    </script>
